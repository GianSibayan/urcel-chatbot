<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URCEL Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #chat-header {
    background: #161b22;
    border-bottom: 1px solid #21262d;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .header-logo {
    width: 32px;
    height: 32px;
    background: #c1121f;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 14px;
    font-weight: 500;
    color: #e6edf3;
    letter-spacing: 0.01em;
  }

  .header-text p {
    font-size: 11px;
    color: #7d8590;
    margin-top: 1px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: #3fb950;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.bot .msg-avatar { background: #c1121f; color: #fff; }
  .msg.user .msg-avatar { background: #21262d; color: #7d8590; border: 1px solid #30363d; }

  .msg-bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.65;
  }

  .msg.bot .msg-bubble {
    background: #161b22;
    border: 1px solid #21262d;
    color: #e6edf3;
    border-top-left-radius: 4px;
  }

  .msg.user .msg-bubble {
    background: #c1121f;
    color: #fff;
    border-top-right-radius: 4px;
  }

  .msg-bubble strong { font-weight: 500; color: #79c0ff; }
  .msg.user .msg-bubble strong { color: #ffd0d0; }

  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
  }

  .typing-indicator span {
    width: 5px;
    height: 5px;
    background: #7d8590;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  #suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 20px 12px;
    flex-shrink: 0;
  }

  .suggestion-chip {
    background: #161b22;
    border: 1px solid #30363d;
    color: #8b949e;
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .suggestion-chip:hover {
    border-color: #c1121f;
    color: #e6edf3;
    background: #1a0507;
  }

  #input-area {
    background: #161b22;
    border-top: 1px solid #21262d;
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 10px;
    color: #e6edf3;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    padding: 10px 14px;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  #user-input::placeholder { color: #484f58; }
  #user-input:focus { border-color: #c1121f; }

  #send-btn {
    width: 38px;
    height: 38px;
    background: #c1121f;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    align-self: flex-end;
  }

  #send-btn:hover { background: #a50e19; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { background: #21262d; cursor: not-allowed; }

  #send-btn svg { width: 16px; height: 16px; fill: #fff; }

  .welcome-msg {
    text-align: center;
    padding: 24px 16px 8px;
    color: #7d8590;
    font-size: 12px;
    line-height: 1.6;
  }

  .welcome-msg strong {
    display: block;
    font-size: 15px;
    font-weight: 500;
    color: #e6edf3;
    margin-bottom: 6px;
  }
</style>
</head>
<body>

<div id="chat-header">
  <div class="header-logo">UR</div>
  <div class="header-text">
    <h1>URCEL Assistant</h1>
    <p>Universal Robina Central Engineering Library</p>
  </div>
 <button onclick="clearChat()" style="background:none;border:1px solid #30363d;color:#8b949e;font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;margin-left:auto;margin-right:8px;">New Chat</button>
  <div class="status-dot"></div>
</div>

<div id="messages">
  <div class="welcome-msg">
    <strong>Hello! I'm the URCEL Assistant.</strong>
    Ask me about the URCEL project, folder structures, access controls, permission groups, or how to navigate the library.
  </div>
</div>

<div id="suggestions">
  <button class="suggestion-chip" onclick="sendSuggestion(this)">What's the URCEL folder structure?</button>
  <button class="suggestion-chip" onclick="sendSuggestion(this)">How does Content Approval work?</button>
  <button class="suggestion-chip" onclick="sendSuggestion(this)">What are the URCEL permission groups?</button>
  <button class="suggestion-chip" onclick="sendSuggestion(this)">What are the future plans for URCEL?</button>
  <button class="suggestion-chip" onclick="sendSuggestion(this)">How do I request access to URCEL?</button>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="Ask about folders, access, projects, or permissions..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()" aria-label="Send">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>
</div>

<script>
 function clearChat() {
  conversationHistory.length = 0;
  messagesEl.innerHTML = `<div class="welcome-msg"><strong>Hello! I'm the URCEL Assistant.</strong> Ask me about the URCEL project, folder structures, access controls, permission groups, or how to navigate the library.</div>`;
  suggestionsEl.style.display = 'flex';
}
const GAS_URL = '/api/chat';

const SYSTEM_PROMPT = `You are the URCEL Assistant — a helpful AI for the Universal Robina Central Engineering Library (URCEL), a SharePoint-based document management system under Universal Robina Corporation (URC), part of JG Summit Holdings. You have full knowledge of the URCEL project based on the official turnover document prepared by GE Intern Sander R. Demdam.

---

## I. PROJECT BACKGROUND

The URCEL Project aims to improve the workflow and ease of navigation of the URC Central Engineering Library. It addresses two primary pain points:
1. Unstandardized folder structure — decreases ease of navigation and data discoverability.
2. Lack of effective access control and file management — needs revision and augmentation of access request, file management, and access control protocols.

URCEL currently operates as a SharePoint-based repository for active and archived project documentation. While the current scope is focused on Philippine operations, the structure is designed with scalability in mind for future multi-country applications.

### Objectives:
1. Standardize folder structures and contents.
2. Implement multi-access controls using SharePoint groups, limiting access to specific members of active projects or specific plants.
3. Optimize and verify file movements via an automated request-and-approval workflow routed to designated Gatekeepers, reducing manual administrative processing time.
4. Build regional scalability for other URC regions.

---

## II. CURRENT STATUS

### II.A. SharePoint Home Page & Folder Structure

**Navigation Flow (as of April 20, 2026 meeting):**

URCEL HOMEPAGE
├── PHILIPPINES
│   ├── ACTIVE PROJECTS
│   │   └── PLANT n...
│   │       └── PROJECT n...
│   │           ├── AUDIT
│   │           │   └── P&L
│   │           ├── PREEXCOM
│   │           │   ├── DETAILED DESIGN
│   │           │   └── PLANNING
│   │           └── POSTEXCOM
│   │               ├── BASIC DESIGN
│   │               ├── EXECOM
│   │               ├── FEASIBILITY AND CONCEPTUAL
│   │               └── FINANCIAL ANALYSIS
│   ├── MASTER DATA (contains finished project files, same structure as ACTIVE PROJECTS)
│   └── REFERENCES (contains reference files e.g. contracts, designs)
├── OTHER SEA HUBS (China, Myanmar, Thailand, Vietnam, Indonesia, Malaysia)
    └── Same structure as PHILIPPINES (or different due to domain group/SharePoint channel differences)

The three main folders retained for the URCEL project are: ACTIVE PROJECTS, MASTER DATA, and REFERENCES.

**Folder Contents Reference:** Based on the IPMS Audit Checklist (Form no.: SYSF-GE-001-20-03), the required file contents span:
- Section 0: Training (DIC and PIC IPMS Cascade attendance)
- Section 1 (Pre-Execom Phase):
  - 1.1 Feasibility/Conceptual Stage (Project Initiation Form, Signed Study Charter, Market/Demand Study, Capacity Utilization Analysis, Site Location Study, Raw & Packaging Materials Plan, Warehousing & Distribution Plan, Transformation Flow Sheet, PFD, Technical Study, Final Formula Card, Preliminary Layout, Risk Management & Permitting Plan, Execution Strategy Plan, Procurement Strategy, Technology Option)
  - 1.2 Basic Design & Budget Estimate (General Master Plan, Functional FMECA, BVOA, Design Review Checklist #1, Manufacturing & Capability Assessment, Milestone Schedule, Basic Engineering Design, General Task List, Budget Estimate, SQUAD Approved Design and Budget)
  - 1.3 Financial Analysis (ROI/Payback) (NPV/ROI/Payback Analysis, ExeCom Deck)
  - 1.4 ExeCom (ExeCom Top Sheet)
- Section 2 (Post-Execom Phase):
  - 2.1 Planning (Milestone Schedule, Task List, Project Kick-off, PSR & Cost Trend in SharePoint, Permitting Plan, Project Charter, Design Review Checklist #2, Preliminary Procurement Plan, Purchase of Long Lead Equipment)
  - 2.2 Detailed Design (Design Basis, Design Review Checklist #3, Design Layout Freeze, HACCP Plans, Project Risk Analysis, Final Formula Card, System FMECA, Detailed Permitting Plan, CURD/URD, Approved Procurement Plan, Value Engineering Plan, Approved Process Flow Sheets, Spare Parts Management Plan, Design Review #4, Detailed Design Freeze, Approved Detailed Task List, FAT Plan, IFC Drawing and Plans)
  - 2.3 Execution (Approved Project Schedule in MS Project, Project Risk Register, Construction Plan, PSR & Cost Trend updates, Procurement Plan Updated, Start-Up Plan, Manufacturing Standards, TT&T Plan, Quality & Testing Plan, Permitting Plan updated, Construction Turn-Over)
  - 2.4 Qualification (Installation & Operational Qualification, Punch List Dashboard/ARR, EHS/Q Requirement Validation, Technical Documentation)
  - 2.5 Turnover (Turnover documents, Project Post Mortem/Evaluation including PDAs, Design Review #5 / LFE)

**PSR vs URCEL Project Name Comparison:** There are ~50+ active projects in the Philippine operations. Many PSR names differ from their URCEL folder names. Key plants include: Pampanga, Cavite, San Pedro 1, San Pedro 2, Calamba 1, Calamba 2, Cebu 2.1, Tarlac, NSL (Nueva Santa Rosa/Laguna), ESMO, Canlubang, and Bulacan.

**URCEL Homepage:** Features Southeast Asia hub buttons for Philippines, China, Myanmar, Thailand, Vietnam, Indonesia, and Malaysia. Also has a Product Launch Countdown widget and a Comments section.

---

### II.B. SharePoint Content Approval Flow

**1. SharePoint Content Approval Settings:**
- Request Access is the current main method for requesting file access to URCEL. It is handled either by (1) site owners or (2) a specified single email.
- Limitation: Request Access can only route to either site owners or one specified email — not multiple designated approvers.
- Content Approval can be implemented for more flexible file management. Designated Gatekeepers (per project/folder) can approve/reject files when uploaded or modified.
  - Settings are limited to the Document Library level / Permission Groups level.
  - Example: Content Approval activated for the entire PHILIPPINE document library. Disabling it for just the REFERENCES subfolder is currently not possible (requires further research on permissions granularity).
  - Approval States:
    - PENDING — visible only to site/group owner and the file owner
    - APPROVED — visible to all site/group members
    - REJECTED — returned to project owner; visible only to file owner and approvers
- Content Approval can be manually navigated via: select file > right-click > More options > Approve/Reject, or via the "..." button on the upper right > Approve/Reject.

**2. Power Automate Flow for Content Approval:**
- Power Automate can assign designated content approvers/gatekeepers.
- Limitation: This can be tedious to set up since it requires a different flow configuration for each folder/project/plant.
- Flow logic: Trigger = "When an item or file is modified" → Condition check → If true: Start and wait for approval → Create HTML table → Condition 1 → Set content approval status (Approved or Rejected) → Send email notification (V2).
- Notifications can be sent via MS Teams or Email.

---

### II.C. Gatekeepers and Related Permission Groups

SharePoint group permissions are used to apply permissions for two or more members. More research is needed on whether these can be directly applied to Power Automate flows.

**Current Permission Groups in URCEL (as of turnover):**

**By Plant:**
- BAGONG ILOG (no members currently)
- CEBU 2 (includes operators, engineers, managers from production, EHS, compliance, quality assurance, etc.)

**By Project:**
- C3PO Layered SP2 (cross-functional team: manufacturing, G&C, sourcing, corporate maintenance, packaging engineering, quality assurance, etc.)
- C3PO NUR 2021 (design, packaging, electrical, civil engineering, plant maintenance, manufacturing, etc.)
- IM Pillar (plant maintenance, category supply chain, facilities, utilities, production, etc.)
- NSL SITE DEVELOPMENT (governance & capability, project management, civil/process engineering)
- PROJECT CHEW TO C2 SOLO (governance & capability only)
- RTD 180ml 2021 (Ready to Drink project team: process, packaging, EHS, planning & control, category, etc.)
- STALLION Group (large cross-functional group spanning manufacturing, engineering systems, civil, maintenance, packaging, logistics, global safety, etc.)

**By Department / Others:**
- EHS & COMPLIANCE (EHS managers and compliance officers across plants)
- MES TEAM (maintenance, production, IT/global systems, manufacturing quality)
- Vision Group (governance & capability)
- Plant Maintenance (ISC PH maintenance managers across multiple plants)
- SCRUM (project planning, control & importation, procurement governance, payment settlement)
- CENTRAL ENGINEERING LIBRARY Members (broad group including ESD interns, engineers, planners, production officers, technical trainers, global sustainability, etc.)
- CENTRAL ENGINEERING LIBRARY Owners (currently no members listed)
- CENTRAL ENGINEERING LIBRARY Visitors (engineers, project managers, designers, process engineers, compliance officers, category managers, packaging engineers, etc. — read-only access)

---

## III. FUTURE PLANS

1. Finalize the folder structures.
2. Create Power Automate flows for Folder Creation.
   - If possible, connect with PSR PowerApps so project creation in PSR syncs with URCEL folder creation.
   - End goal: PSR files to eventually migrate to URCEL.
3. Create/refine the Content Approval Power Automate Flow; explore other alternatives to improve file access and access request handling.
4. Determine the list of Gatekeepers per project/plant.
5. Depending on progress in SharePoint implementation, progress to the Power Apps development phase.

---

## YOUR ROLE AS URCEL ASSISTANT

- Answer questions about the URCEL project, its objectives, current status, folder structure, content approval flows, permission groups, and future plans.
- Help users understand where documents are stored or should be stored (e.g., "Execution-phase files go under Active Projects > [Plant] > [Project] > POSTEXCOM").
- Guide users on how access requests work and what the approval states mean.
- Explain which permission groups exist and what they cover.
- Be concise, professional, and direct.
- If something is outside the scope of the turnover document, say so honestly and suggest contacting the site owner or supervisor.

Keep responses short and helpful — 2 to 5 sentences max unless a detailed breakdown is genuinely needed.`;

const conversationHistory = [];
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const suggestionsEl = document.getElementById('suggestions');

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

function sendSuggestion(btn) {
  inputEl.value = btn.textContent;
  suggestionsEl.style.display = 'none';
  sendMessage();
}

function appendMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? 'UR' : 'You';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">UR</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  suggestionsEl.style.display = 'none';

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', parts: [{ text }] });
  showTyping();

  const requestBody = {
    system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents: conversationHistory
  };

  try {
   const res = await fetch(GAS_URL, {
     method: 'POST',
     headers: { 'Content-Type': 'application/json', 'x-sp-cookie': document.cookie},
     body: JSON.stringify(requestBody)
   });

    const data = await res.json();
    removeTyping();

    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I could not get a response. Please try again.';
    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    appendMessage('bot', reply);
  } catch (err) {
    removeTyping();
    appendMessage('bot', 'Connection error. Please check your network and try again.');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
