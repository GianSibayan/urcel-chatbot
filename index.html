<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URCEL Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #chat-header {
    background: #161b22;
    border-bottom: 1px solid #21262d;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .header-logo {
    width: 32px;
    height: 32px;
    background: #c1121f;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 14px;
    font-weight: 500;
    color: #e6edf3;
    letter-spacing: 0.01em;
  }

  .header-text p {
    font-size: 11px;
    color: #7d8590;
    margin-top: 1px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: #3fb950;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.bot .msg-avatar { background: #c1121f; color: #fff; }
  .msg.user .msg-avatar { background: #21262d; color: #7d8590; border: 1px solid #30363d; }

  .msg-bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.65;
  }

  .msg.bot .msg-bubble {
    background: #161b22;
    border: 1px solid #21262d;
    color: #e6edf3;
    border-top-left-radius: 4px;
  }

  .msg.user .msg-bubble {
    background: #c1121f;
    color: #fff;
    border-top-right-radius: 4px;
  }

  .msg-bubble strong { font-weight: 500; color: #79c0ff; }
  .msg.user .msg-bubble strong { color: #ffd0d0; }

  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
  }

  .typing-indicator span {
    width: 5px;
    height: 5px;
    background: #7d8590;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  #suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 20px 12px;
    flex-shrink: 0;
  }

  .suggestion-chip {
    background: #161b22;
    border: 1px solid #30363d;
    color: #8b949e;
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  .suggestion-chip:hover {
    border-color: #c1121f;
    color: #e6edf3;
    background: #1a0507;
  }

  #input-area {
    background: #161b22;
    border-top: 1px solid #21262d;
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 10px;
    color: #e6edf3;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    padding: 10px 14px;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  #user-input::placeholder { color: #484f58; }
  #user-input:focus { border-color: #c1121f; }

  #send-btn {
    width: 38px;
    height: 38px;
    background: #c1121f;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    align-self: flex-end;
  }

  #send-btn:hover { background: #a50e19; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { background: #21262d; cursor: not-allowed; }

  #send-btn svg { width: 16px; height: 16px; fill: #fff; }

  .welcome-msg {
    text-align: center;
    padding: 24px 16px 8px;
    color: #7d8590;
    font-size: 12px;
    line-height: 1.6;
  }

  .welcome-msg strong {
    display: block;
    font-size: 15px;
    font-weight: 500;
    color: #e6edf3;
    margin-bottom: 6px;
  }
</style>
</head>
<body>

<div id="chat-header">
  <div class="header-logo">UR</div>
  <div class="header-text">
    <h1>URCEL Assistant</h1>
    <p>Universal Robina Central Engineering Library</p>
  </div>
  <div class="status-dot"></div>
</div>

<div id="messages">
  <div class="welcome-msg">
    <strong>Hello! I'm the URCEL Assistant.</strong>
    Ask me about engineering records, plant locations, document status, or how to navigate the library.
  </div>
</div>

<div id="suggestions">
  <button class="suggestion-chip" onclick="sendSuggestion(this)">Where are PH plant records?</button>
  <button class="suggestion-chip" onclick="sendSuggestion(this)">How do I find Myanmar documents?</button>
  <button class="suggestion-chip" onclick="sendSuggestion(this)">What's in the Documents Library?</button>
  <button class="suggestion-chip" onclick="sendSuggestion(this)">How do I access China records?</button>
</div>

<div id="input-area">
  <textarea id="user-input" placeholder="Ask about a plant, location, or document..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()" aria-label="Send">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>
</div>

<script>
const GAS_URL = '/api/chat';

const SYSTEM_PROMPT = `You are the URCEL Assistant — a helpful AI for the Universal Robina Central Engineering Library (URCEL), a private SharePoint-based document management site under Universal Robina Corporation (URC), part of JG Summit Holdings.

URCEL serves engineering teams across Southeast Asia. Its purpose is to centralize engineering documents, plant records, technical references, and status reports for URC's regional operations.

SITE STRUCTURE:
- Documents Library: Main file repository
  - PH: Philippine plant engineering records
  - CHINA: China operations documents
  - MYANMAR: Myanmar plant records
- Other sections may include region-specific subfolders (Vietnam, Thailand, Indonesia, Malaysia based on the hub buttons on the homepage)

YOUR ROLE:
- Help users find where records are stored (e.g., "Records for Laguna plant are under Documents Library > PH")
- Answer questions about document status, plant locations, and how to navigate the library
- Guide users on who to contact or what folder to check
- Be concise, professional, and direct
- If you don't know the exact file location, guide the user to the most relevant folder and suggest they search within it

IMPORTANT: You do not have live access to the actual files. Guide users to the right location based on the site structure above. Always be honest if something is outside your knowledge.

Keep responses short and helpful — 2 to 4 sentences max unless a detailed explanation is needed.`;

const conversationHistory = [];
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const suggestionsEl = document.getElementById('suggestions');

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

function sendSuggestion(btn) {
  inputEl.value = btn.textContent;
  suggestionsEl.style.display = 'none';
  sendMessage();
}

function appendMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? 'UR' : 'You';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">UR</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  suggestionsEl.style.display = 'none';

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', parts: [{ text }] });
  showTyping();

  const requestBody = {
    system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents: conversationHistory
  };

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });

    const data = await res.json();
    removeTyping();

    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I could not get a response. Please try again.';
    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    appendMessage('bot', reply);
  } catch (err) {
    removeTyping();
    appendMessage('bot', 'Connection error. Please check your network and try again.');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
